# Cert covers both poll.dailyprizm.com (primary) and api-poll.dailyprizm.com (SAN).
# Single fullchain/privkey shared by both HTTPS server blocks.

# --- HTTP -> HTTPS redirect (with ACME passthrough) ---
server {
    listen 80;
    server_name poll.dailyprizm.com api-poll.dailyprizm.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: Backend API ---
server {
    listen 443 ssl;
    http2 on;
    server_name api-poll.dailyprizm.com;

    ssl_certificate     /etc/letsencrypt/live/poll.dailyprizm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poll.dailyprizm.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://backend:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- HTTPS: Frontend ---
server {
    listen 443 ssl;
    http2 on;
    server_name poll.dailyprizm.com;

    ssl_certificate     /etc/letsencrypt/live/poll.dailyprizm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poll.dailyprizm.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
